name: CD — Deploy to Streamlit Cloud

on:
  push:
    branches: [main]           # Deploy only when code is merged to main
  workflow_dispatch:           # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Trigger Streamlit Cloud Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # 3. Install dependencies (validation step)
      - name: Install & validate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Smoke-test: verify imports work correctly
      - name: Smoke test imports
        env:
          OPENAI_API_KEY: "sk-test-smoke"
        run: |
          python -c "
          from app.pdf_processor import split_documents, load_pdf_from_bytes
          from app.vector_store import build_vector_store, similarity_search
          from app.rag_chain import build_rag_chain, ask_question
          print('✅ All imports successful')
          "

      # ─────────────────────────────────────────────────────────────────────────
      # Streamlit Community Cloud deploys automatically when you push to the
      # branch you linked during setup — no extra step needed here.
      #
      # This job serves as a deployment gate:
      #   • If imports or install fail → deployment is blocked
      #   • If everything passes → Streamlit Cloud picks up the push automatically
      #
      # For private / self-hosted deployments, replace this step with your
      # preferred deploy action (e.g., fly.io, Railway, Render, AWS, etc.)
      # ─────────────────────────────────────────────────────────────────────────

      - name: Deployment summary
        run: |
          echo "🚀 All checks passed."
          echo "Streamlit Community Cloud will auto-deploy from the 'main' branch."
          echo "Visit https://share.streamlit.io to monitor your deployment."
