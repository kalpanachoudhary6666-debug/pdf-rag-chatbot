name: CI — Lint & Test

on:
  push:
    branches: ["**"]          # Run on every branch push
  pull_request:
    branches: [main]           # Run on PRs targeting main

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the requested Python version
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lint with Ruff (fast Python linter)
      - name: Lint with Ruff
        run: |
          ruff check app/ tests/ app.py --output-format=github

      # 5. Run tests with coverage
      - name: Run tests with pytest
        env:
          OPENAI_API_KEY: "sk-test-key-for-ci"   # Mocked; real calls are patched in tests
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing

      # 6. Upload coverage report as artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
